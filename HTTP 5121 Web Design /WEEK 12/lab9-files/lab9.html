<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Lab 9 - Keyframe Animations</title>
    <link rel="stylesheet" href="./css/styles.css">
    <script async defer src="./js/script.js"></script>
  </head>
  <body>
    <header>
      <h2 class="site-name">Fry your egg!</h2>
      <div>Time: <span class="timer"></span></div>
      <div>
        <button id="start">Cook</button>
        <button id="stop">Stop</button>
      </div>
    </header>
    <main>
      <h1 class="instructions">Start frying your egg and stop when it's sunny-side up.</h1>
      <div class="wrapper">
        <div class="stove">
          <div class="pan">
            <div id="egg">
              <div id="yolk"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="status">Start cooking!</div>
    </main>
  </body>
</html>
