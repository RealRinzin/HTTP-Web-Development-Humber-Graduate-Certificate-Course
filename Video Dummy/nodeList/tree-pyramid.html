<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tree Pyramid</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    h1 {
      color: #f0f0f0;
      font-size: 1rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 60px;
      opacity: 0.4;
    }

    .tree {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .level {
      display: flex;
      justify-content: center;
      gap: 16px;
      position: relative;
    }

    /* connector lines */
    .level:not(:last-child)::after {
      content: '';
      position: absolute;
      bottom: -30px;
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      height: 30px;
      background: #333;
    }

    .spacer {
      height: 30px;
      position: relative;
    }

    /* horizontal line connecting children */
    .h-line {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translateX(-50%);
      height: 2px;
      background: #333;
    }

    /* vertical drops from h-line to nodes */
    .v-drops {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      display: flex;
      justify-content: space-around;
    }

    .v-drop {
      width: 2px;
      height: 15px;
      background: #333;
    }

    .node {
      width: 90px;
      height: 48px;
      border: 1.5px solid #444;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e0e0e0;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      cursor: default;
      transition: border-color 0.2s, background 0.2s, color 0.2s;
      animation: fadeIn 0.5s ease forwards;
      opacity: 0;
    }

    .node:hover {
      border-color: #7effd4;
      background: rgba(126, 255, 212, 0.06);
      color: #7effd4;
    }

    .node.root {
      width: 110px;
      height: 54px;
      border-color: #7effd4;
      color: #7effd4;
      font-weight: 700;
      font-size: 0.85rem;
      animation-delay: 0s;
    }

    .node.child { animation-delay: 0.3s; }
    .node.leaf  { animation-delay: 0.6s; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* SVG connector overlay */
    svg.connectors {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
      overflow: visible;
    }
  </style>
</head>
<body>

<h1>Tree Structure</h1>

<div class="tree" id="tree"></div>

<script>
  // --- Data ---
  const tree = {
    value: "Root",
    children: [
      {
        value: "Child 1",
        children: [
          { value: "Node 1-1" },
          { value: "Node 1-2" },
          { value: "Node 1-3" }
        ]
      },
      {
        value: "Child 2",
        children: [
          { value: "Node 2-1" },
          { value: "Node 2-2" },
          { value: "Node 2-3" }
        ]
      }
    ]
  };

  // --- Render ---
  const container = document.getElementById('tree');

  // Level 0: Root
  const lvl0 = document.createElement('div');
  lvl0.className = 'level';
  const rootEl = makeNode(tree.value, 'root');
  lvl0.appendChild(rootEl);
  container.appendChild(lvl0);

  // Gap
  container.appendChild(makeSpacer());

  // Level 1: Children
  const lvl1 = document.createElement('div');
  lvl1.className = 'level';
  lvl1.style.gap = '60px';
  const childEls = tree.children.map(c => {
    const el = makeNode(c.value, 'child');
    lvl1.appendChild(el);
    return el;
  });
  container.appendChild(lvl1);

  // Gap
  container.appendChild(makeSpacer());

  // Level 2: Leaves
  const lvl2 = document.createElement('div');
  lvl2.className = 'level';
  lvl2.style.gap = '10px';
  tree.children.forEach(child => {
    const group = document.createElement('div');
    group.style.display = 'flex';
    group.style.gap = '10px';
    child.children.forEach(leaf => {
      group.appendChild(makeNode(leaf.value, 'leaf'));
    });
    lvl2.appendChild(group);
    // small gap between groups
    const sep = document.createElement('div');
    sep.style.width = '40px';
    lvl2.appendChild(sep);
  });
  // remove last sep
  lvl2.removeChild(lvl2.lastChild);
  container.appendChild(lvl2);

  // --- Draw SVG lines after layout ---
  window.addEventListener('load', drawLines);
  setTimeout(drawLines, 100);

  function drawLines() {
    const existing = container.querySelector('svg');
    if (existing) existing.remove();

    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.classList.add('connectors');
    container.style.position = 'relative';
    container.appendChild(svg);

    const cr = container.getBoundingClientRect();

    function center(el) {
      const r = el.getBoundingClientRect();
      return {
        x: r.left - cr.left + r.width / 2,
        y: r.top - cr.top + r.height / 2
      };
    }

    function line(x1, y1, x2, y2) {
      const l = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      l.setAttribute('x1', x1); l.setAttribute('y1', y1);
      l.setAttribute('x2', x2); l.setAttribute('y2', y2);
      l.setAttribute('stroke', '#333');
      l.setAttribute('stroke-width', '1.5');
      svg.appendChild(l);
    }

    const rootPos = center(rootEl);

    // Root → each child
    childEls.forEach(cel => {
      const cp = center(cel);
      line(rootPos.x, rootPos.y + 27, cp.x, cp.y - 24);
    });

    // Each child → its leaves
    const leafGroups = lvl2.querySelectorAll('div');
    let gi = 0;
    childEls.forEach((cel, ci) => {
      const cp = center(cel);
      const groupEl = lvl2.children[ci * 2]; // every other is a group
      const leaves = groupEl.querySelectorAll('.node');
      leaves.forEach(leaf => {
        const lp = center(leaf);
        line(cp.x, cp.y + 24, lp.x, lp.y - 24);
      });
    });
  }

  function makeNode(text, cls) {
    const d = document.createElement('div');
    d.className = `node ${cls}`;
    d.textContent = text;
    return d;
  }

  function makeSpacer() {
    const s = document.createElement('div');
    s.style.height = '48px';
    return s;
  }
</script>
</body>
</html>
