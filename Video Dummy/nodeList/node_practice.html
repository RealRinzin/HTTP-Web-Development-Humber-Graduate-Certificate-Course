          { id: 2, name: "A Branch", parent_id: 1 },

          { id: 4, name: "B Branch", parent_id: 2 },
          { id: 5, name: "B Branch", parent_id: 2 },
        ];
        // console.log(nodes);
        for (let i = 0; i < nodes.length; i++) {
          const h2 = document.createElement("li");
          h2.textContent = `${nodes[i].id}`;
          tree.appendChild(h2);
        }
