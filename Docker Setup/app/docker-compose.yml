version: "1.1"
services:
  # All services / Images will be listing here
  # NGINX
# ************************************************ NGINX ********************************************************
  nginx:
    # image is for the service you want to run on it
    # such as nginx, ubuntu, php, node etc
    image: nginx:latest
    # The port number you want to run the app
    # this this case the port 80 which is for the HTTP with 9090
    ports:
      - "9090:80"
    # A volume connects a folder/file on your computer 👉 to a folder/file inside the container.
    volumes:
      # - ./frontend:/usr/share/nginx/html # This is custom volume pointer
      - ./frontend:/var/www/html # This is custom volume pointer
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf # This is default Nginx etc host configuration
    # Ensures Nginx starts after PHP service is up.
    depends_on:
      - php
    networks:
      - app-network # Connect with network
# ************************************************ PHP ********************************************************
  # PHP 8.2
  php:
    # image: php:8.2-fpm # Basic PHP-FPM service
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - mysql
    volumes:
      - ./frontend:/var/www/html
    networks:
      - app-network
# ************************************************ NODE JS ********************************************************
  node:
    image: node:latest
    working_dir: /var/www/html
    volumes:
      - ./frontend:/var/www/html
    command: npm run start
    ports:
      - "4000:4000"
    networks:
      - app-network
# ************************************************ MYSQL ********************************************************
  # MYSQL 8.0
  mysql:
    image: mysql:8.4
        # container_name: mysql_db  ← OPTIONAL (remove if you don't need it)
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password_123
      MYSQL_DATABASE: student_db
      MYSQL_USER: user
      MYSQL_PASSWORD: user_password_123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network
# ************************************************ VOLUMES ****************************
volumes:
  mysql_data:
# ************************************************ NETWORK ****************************
# Define a custom network
networks:
  app-network:
    driver: bridge
