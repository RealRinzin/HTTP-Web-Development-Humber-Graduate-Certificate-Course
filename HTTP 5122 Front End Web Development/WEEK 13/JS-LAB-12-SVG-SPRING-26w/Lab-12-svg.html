<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>SVG Lab</title>
  </head>
  
  <body id="svgBody">
    <div id="svgDiv">
      <svg
        width="300"
        height="300"
        xmlns="http://www.w3.org/2000/svg"
        version="1.1"
      >
        <!--ALL OF YOUR SVG ELEMENTS GO HERE INSIDE THE <svg PARENT ELEMENT.-->

        <!-- UNCOMMENT THE LINES BELOW TO SEE HOW I USED THE <pattern> SVG ELEMENT WITH A SQUARE TO CREATE A 10px by 10px GRID OVERLAY TO MAKE LOCATING COORDINATES EASIER WHILE I CREATED THE GRAPHIC. -->
        <pattern
          id="dotGrid"
          patternUnits="userSpaceOnUse"
          x="0"
          y="0"
          width="10"
          height="10"
        >
          <rect width="10" height="10" stroke="black" fill="none" />
        </pattern>
        <rect width="300" height="300" fill="url(#dotGrid)" />
        <!-- Sky -->
        <rect width="300" height="160" x="0" y="0" fill="#3D85C6" />

        <!-- Cloud -->
        <circle r="25" cx="50" cy="50" fill="#ebf2f9" />
        <circle r="25" cx="20" cy="60" fill="#ebf2f9" />
        <ellipse rx="50" ry="20" cx="70" cy="70" fill="#ebf2f9" />
        <!-- Cloud 2 -->
        <circle r="25" cx="200" cy="70" fill="#ebf2f9" />
        <circle r="25" cx="160" cy="70" fill="#ebf2f9" />
        <ellipse rx="50" ry="20" cx="200" cy="91" fill="#ebf2f9" />
        <!--  sun-->
        <ellipse rx="25" ry="22" cx="270" cy="30" fill="#f1c232" />
        
		<!-- Mountains -->
		<polygon points="100,90 270,190 50,190"  fill="#f1c232"/>
        <circle r="5" cx="102" cy="95" fill="#f1c232"/>
		

        <!-- Ground -->
        <rect width="300" height="180" x="0" y="160" fill="#54863f" />
      </svg>
    </div>
  </body>
</html>
