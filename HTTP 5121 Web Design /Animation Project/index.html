<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Penalty Shoot Game</title>
    <link rel="stylesheet" href="./assets/css/style.min.css" />
  </head>
  <body>
    <div id="score_board">
      <h4>Score Board</h4>
      <p>
        <span id="goal_counter"></span> / 10
      </p>
      <ul id="goal_counter_balls" style="display: flex; gap: 2em; list-style: none;">
      </ul>
    </div>

    <div id="penalty_area">
      <div class="goal_keeper">
        <div style="justify-content: center; display: flex">
          <div
            style="
              width: 2%;
              height: 100px;
              border: solid 1px gray;
              background: white;
            "
          ></div>
          <div
            style="
              width: 90%;
              border: solid 1px gray;
              height: 10px;
              background: white;
            "
          ></div>
          <div
            style="
              width: 2%;
              height: 100px;
              border: solid 1px gray;
              background: white;
            "
          ></div>
        </div>
        <div id="keeper_wrapper">
          <img
            id="left"
            src="./assets/img/keeper_dive_left.png"
            alt=""
            class=""
          />
          <img src="./assets/img/goal-keeper.png" alt="" />
          <img
            id="center"
            src="./assets/img/keeper_jump.png"
            alt=""
          class=""
          />
          <img
            id="right"
            src="./assets/img/keeper_dive_right.png"
            alt=""
            class=""
          />

        </div>
      </div>
      <div id="shoot_area">
        <div class="shoot_wrapper">
          <div class="shoot_area_angles">
            <span id="shoot_left" onclick="shootLeft()">
              <i class="fa-solid fa-arrow-pointer fa-2x left"></i
            ></span>
            <span id="shoot_center" onclick="shootCenter()">
              <i class="fa-solid fa-arrow-pointer fa-2x center"></i
            ></span>
            <span class="shoot_right" onclick="shootRight()">
              <i class="fa-solid fa-arrow-pointer fa-2x right_direction"></i
            ></span>
          </div>
          <div id="ball">
            <img src="./assets/img/ball.png" alt="" />
          </div>
        </div>
      </div>
    </div>
    <!-- <audio autoplay loop>
      <source src="./assets/audios/stadium-noise.mp3" type="audio/mpeg" />
      Your browser does not support the audio element.
    </audio> -->
    <script src="./assets/js/script.min.js"></script>
    <!-- font awesome icons -->
    <script
      src="https://kit.fontawesome.com/f15d50a24d.js"
      crossorigin="anonymous"
    ></script>

    <script>
      // window.addEventListener("click", () => {
      //   const audio = document.getElementById("bgMusic");
      //   audio.muted = false;
      //   audio.play();
      // });
    </script>
  </body>
</html>
